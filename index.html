  .clear-btn { background: #333; color: #aaa; border: none; padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 10px; }

function pad(n) {
  return String(n).padStart(2,'0');
}

function findNext() {
  const currVal = document.getElementById('curr').value.trim();
  const resultDiv = document.getElementById('result');

  if (!currVal) {
    resultDiv.innerHTML = '<div class="error">⚠️ Number daalo!</div>';
    return;
  }

  const curr = parseInt(currVal);
  const results = [];

  tickets.forEach(ticket => {
    let flat = [];
    ticket.rows.forEach((row, ri) => {
      row.forEach((num, ni) => {
        flat.push({num, ri, ni});
      });
    });

    flat.forEach((item, idx) => {
      if (item.num === curr) {
        let nextNum = null;
        let isEnd = false;
        if (idx + 1 < flat.length) {
          nextNum = flat[idx + 1].num;
        } else {
          isEnd = true;
        }

        const row = ticket.rows[item.ri];
        const rowStr = row.map((n, i) => {
          const s = pad(n);
          return i === item.ni ? `[${s}]` : s;
        }).join('→');

        results.push({
          ticketName: ticket.name,
          rowNum: item.ri + 1,
          rowStr,
          nextNum,
          isEnd
        });
      }
    });
  });

  if (results.length === 0) {
    resultDiv.innerHTML = '<div class="error">❌ Yeh number list mein nahi hai!</div>';
    return;
  }

  // Group by next number
  const grouped = {};
  results.forEach(r => {
    const key = r.isEnd ? 'END' : String(r.nextNum);
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  let html = `<div class="count">${results.length} jagah mila</div>`;

  Object.keys(grouped).sort().forEach(key => {
    const group = grouped[key];
    const isEnd = key === 'END';
    html += `<div class="card">`;
    if (isEnd) {
      html += `<div class="ticket-end">🏁 Ticket Khatam</div>`;
    } else {
      html += `<div class="next-num">${pad(parseInt(key))}</div>`;
    }
    group.forEach(r => {
      html += `<div class="ticket-name">${r.ticketName} — Row ${r.rowNum}</div>`;
      html += `<div class="row-display">${r.rowStr}</div>`;
    });
    html += `</div>`;
  });

  resultDiv.innerHTML = html;
}

function clearAll() {
  document.getElementById('curr').value = '';
  document.getElementById('result').innerHTML = '';
  document.getElementById('curr').focus();
}

document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') findNext();
});
</script>
