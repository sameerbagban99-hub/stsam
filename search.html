  .search-box label { color: #888; font-size: 12px; display: block; margin-bottom: 6px; }
  .inputs { display: flex; gap: 8px; margin-bottom: 12px; }
  input { background: #0f3460; border: 1px solid #f0a500; color: #fff; padding: 10px; border-radius: 8px; font-size: 18px; width: 80px; text-align: center; font-family: monospace; }
  button { background: #f0a500; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; flex: 1; }

  .result { background: #0f3460; border-radius: 12px; padding: 16px; margin-top: 12px; display: none; }
  .result.show { display: block; }
  .next-num { font-size: 48px; color: #00ff88; text-align: center; font-weight: bold; margin: 10px 0; }
  .context { color: #888; font-size: 12px; text-align: center; margin-bottom: 8px; }
  .row-display { color: #00d4ff; font-size: 13px; text-align: center; word-break: break-all; }
  .error { color: #ff4444; text-align: center; font-size: 14px; padding: 10px; }
  .multiple { margin-top: 8px; }
  .option { background: #16213e; border: 1px solid #444; border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
  .option:active { background: #0f3460; }
  .option-title { color: #f0a500; font-size: 11px; margin-bottom: 4px; }
  .option-row { color: #00d4ff; font-size: 12px; }
  .option-next { color: #00ff88; font-size: 16px; font-weight: bold; }
  .tip { background: #0f3460; border-left: 3px solid #f0a500; padding: 8px 12px; border-radius: 4px; font-size: 11px; color: #aaa; margin-bottom: 16px; }
  .clear-btn { background: #333; color: #aaa; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 8px; width: 100%; }
  .ticket-end { color: #ff9900; font-size: 13px; text-align: center; margin-top: 6px; }

// Build a flat sequence map: for each (prev, curr) pair -> next number + context
function buildMap() {
  const map = {};
  
  tickets.forEach((ticket, ti) => {
    // Flatten all rows into one sequence
    let flat = [];
    ticket.rows.forEach((row, ri) => {
      row.forEach((num, ni) => {
        flat.push({num, ti, ri, ni, ticketName: ticket.name});
      });
    });
    
    // For each consecutive pair, store next
    for (let i = 0; i < flat.length - 1; i++) {
      const prev = flat[i].num;
      const curr = flat[i+1].num;
      const key = `${prev}_${curr}`;
      if (!map[key]) map[key] = [];
      
      // Next number
      let nextNum = null;
      let isTicketEnd = false;
      let nextInfo = '';
      
      if (i + 2 < flat.length) {
        nextNum = flat[i+2].num;
        nextInfo = `${ticket.name}, Row ${flat[i+2].ri + 1}`;
      } else {
        isTicketEnd = true;
      }
      
      // Build row display
      const row = ticket.rows[flat[i+1].ri];
      const rowStr = row.map((n, idx) => {
        const s = String(n).padStart(2,'0');
        if (idx === flat[i+1].ni) return `[${s}]`;
        return s;
      }).join(' → ');
      
      map[key].push({
        nextNum,
        isTicketEnd,
        ticketName: ticket.name,
        rowNum: flat[i+1].ri + 1,
        rowStr,
        nextInfo
      });
    }
  });
  
  return map;
}

const searchMap = buildMap();

function pad(n) {
  return String(parseInt(n)||0).padStart(2,'0');
}

function findNext() {
  const prevVal = document.getElementById('prev').value.trim();
  const currVal = document.getElementById('curr').value.trim();
  const resultDiv = document.getElementById('result');
  
  if (!prevVal || !currVal) {
    resultDiv.className = 'result show';
    resultDiv.innerHTML = '<div class="error">⚠️ Dono numbers daalo!</div>';
    return;
  }
  
  const prev = parseInt(prevVal);
  const curr = parseInt(currVal);
  const key = `${prev}_${curr}`;
  const matches = searchMap[key];
  
  if (!matches || matches.length === 0) {
    // Try searching just current number
    resultDiv.className = 'result show';
    resultDiv.innerHTML = `<div class="error">❌ ${pad(prev)} → ${pad(curr)} sequence nahi mila!<br><br>Pichla number sahi hai? Dobara check karo.</div>`;
    return;
  }
  
  if (matches.length === 1) {
    const m = matches[0];
    if (m.isTicketEnd) {
      resultDiv.className = 'result show';
      resultDiv.innerHTML = `
        <div class="context">${m.ticketName}</div>
        <div class="ticket-end">🏁 Ticket khatam! Agla ticket shuru hoga</div>
        <div class="row-display" style="margin-top:8px">${m.rowStr}</div>
      `;
    } else {
      resultDiv.className = 'result show';
      resultDiv.innerHTML = `
        <div class="context">${m.ticketName}, Row ${m.rowNum}</div>
        <div class="next-num">${pad(m.nextNum)}</div>
        <div class="row-display">${m.rowStr}</div>
      `;
    }
  } else {
    // Multiple matches
    let html = `<div class="error" style="color:#f0a500">⚠️ ${matches.length} jagah mila — sahi wala chuno:</div><div class="multiple">`;
    matches.forEach((m, i) => {
      if (m.isTicketEnd) {
        html += `<div class="option" onclick="selectOption(${i})">
          <div class="option-title">${m.ticketName}, Row ${m.rowNum}</div>
          <div class="option-row">${m.rowStr}</div>
          <div class="option-next">🏁 Ticket khatam</div>
        </div>`;
      } else {
        html += `<div class="option" onclick="selectOption(${i}, ${m.nextNum}, '${m.ticketName}', ${m.rowNum})">
          <div class="option-title">${m.ticketName}, Row ${m.rowNum}</div>
          <div class="option-row">${m.rowStr}</div>
          <div class="option-next">Agla: ${pad(m.nextNum)}</div>
        </div>`;
      }
    });
    html += '</div>';
    resultDiv.className = 'result show';
    resultDiv.innerHTML = html;
  }
}

function selectOption(i, nextNum, ticketName, rowNum) {
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = `
    <div class="context">${ticketName}, Row ${rowNum}</div>
    <div class="next-num">${String(nextNum).padStart(2,'0')}</div>
  `;
}

function clearAll() {
  document.getElementById('prev').value = '';
  document.getElementById('curr').value = '';
  document.getElementById('result').className = 'result';
  document.getElementById('prev').focus();
}

// Enter key support
document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') findNext();
});
