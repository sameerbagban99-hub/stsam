  [3,88,47,91,19,32,67],[60,66,55,98,33,81,39],[66,21,97,39,41,41,75],[37,80,81,65,49,47,37],
  [71,29,94,40,51,21,38],[31,35,25,39,70,50,73],[40,38,38,55,31,64]

// Build lookup maps
const map1=new Map(), map2=new Map(), map3=new Map(), map4=new Map();
for(const nums of weeklyData){
  for(let i=0;i<nums.length-1;i++){
    const add=(m,k,v)=>{if(!m.has(k))m.set(k,[]);if(!m.get(k).includes(v))m.get(k).push(v);};
    add(map1,nums[i],nums[i+1]);
    if(i+2<nums.length)add(map2,nums[i]+','+nums[i+1],nums[i+2]);
    if(i+3<nums.length)add(map3,nums[i]+','+nums[i+1]+','+nums[i+2],nums[i+3]);
    if(i+4<nums.length)add(map4,nums[i]+','+nums[i+1]+','+nums[i+2]+','+nums[i+3],nums[i+4]);
  }
}

function onInput(el){
  el.classList.toggle('filled', el.value!=='');
  const filled=[n1,n2,n3,n4].filter(e=>e.value!=='').length;
  searchBtn.disabled = filled<2;
  document.getElementById('resultArea').innerHTML='';
}

function doSearch(){
  const ids=['n1','n2','n3','n4'];
  const filled=ids.map(id=>document.getElementById(id).value).filter(v=>v!=='').map(Number);
  let nextNums=[], matchType='';
  if(filled.length>=4){const k=filled.slice(0,4).join(',');if(map4.has(k)&&map4.get(k).length){nextNums=map4.get(k);matchType='4 numbers se match';}}
  if(!nextNums.length&&filled.length>=3){const k=filled.slice(0,3).join(',');if(map3.has(k)&&map3.get(k).length){nextNums=map3.get(k);matchType='3 numbers se match';}}
  if(!nextNums.length&&filled.length>=2){const k=filled.slice(0,2).join(',');if(map2.has(k)&&map2.get(k).length){nextNums=map2.get(k);matchType='2 numbers se match';}}
  if(!nextNums.length&&filled.length>=1){const k=filled[0];if(map1.has(k)&&map1.get(k).length){nextNums=map1.get(k);matchType='1 number se match';}}

  const area=document.getElementById('resultArea');
  if(nextNums.length){
    area.innerHTML=`<div class="result-card">
      <div class="match-type">${matchType}</div>
      <div class="result-label">Agla number(s):</div>
      <div class="result-nums">${nextNums.map(n=>`<div class="result-num">${String(n).padStart(2,'0')}</div>`).join('')}</div>
    </div>`;
  } else {
    area.innerHTML=`<div class="result-card no-match">
      <div class="no-match-icon">❌</div>
      <div class="no-match-text">Koi match nahi mila</div>
      <div class="no-match-sub">Alag numbers try karein</div>
    </div>`;
  }
}

function doClear(){
  ['n1','n2','n3','n4'].forEach(id=>{
    const el=document.getElementById(id);
    el.value=''; el.classList.remove('filled');
  });
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('searchBtn').disabled=true;
}
</script>
